ServerName localhost

# Use relative paths from the repo root so this works on any deploy path
# DigitalOcean App Platform clones the repo to /workspace
# The Procfile runs: heroku-php-apache2 -C apache.conf public/
# So DocumentRoot is automatically set to /workspace/public by heroku-php-apache2

<Directory "${HEROKU_APP_DIR}/public">
    Options -Indexes
    AllowOverride All
    Require all granted

    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteRule ^ /index.html [L]
</Directory>

Alias /api "${HEROKU_APP_DIR}/api"

<Directory "${HEROKU_APP_DIR}/api">
    Options -Indexes
    AllowOverride All
    Require all granted
</Directory>

Alias /uploads "${HEROKU_APP_DIR}/uploads"

<Directory "${HEROKU_APP_DIR}/uploads">
    Options -Indexes
    AllowOverride All
    Require all granted
    <FilesMatch "\.php$">
        Require all denied
    </FilesMatch>
</Directory>
