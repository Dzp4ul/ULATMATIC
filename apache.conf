ServerName localhost

DocumentRoot /app/public

<Directory /app/public>
    Options -Indexes
    AllowOverride All
    Require all granted

    # React SPA — serve index.html for all non-file, non-api routes
    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteRule ^ /index.html [L]
</Directory>

# Route /api requests to the PHP files in /app/api
Alias /api /app/api

<Directory /app/api>
    Options -Indexes
    AllowOverride All
    Require all granted
</Directory>

# Route /uploads to the uploads folder
Alias /uploads /app/uploads

<Directory /app/uploads>
    Options -Indexes
    AllowOverride All
    Require all granted
    # Block PHP execution in uploads
    <FilesMatch "\.php$">
        Require all denied
    </FilesMatch>
</Directory>
